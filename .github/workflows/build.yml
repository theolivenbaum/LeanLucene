name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    if: |
      github.event_name == 'pull_request' ||
      startsWith(github.event.head_commit.message, '[build]') ||
      startsWith(github.event.head_commit.message, '[deploy]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup .NET 11 preview
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '11.0.x'
          dotnet-quality: 'preview'

      - name: Add .NET tools to PATH
        run: echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Restore tests
        run: |
          dotnet restore src/devops/Rowles.LeanLucene.Tests.Unit/Rowles.LeanLucene.Tests.Unit.csproj
          dotnet restore src/devops/Rowles.LeanLucene.Tests.Integration/Rowles.LeanLucene.Tests.Integration.csproj
          dotnet restore src/devops/Rowles.LeanLucene.Tests.Chaos/Rowles.LeanLucene.Tests.Chaos.csproj

      - name: Build tests
        run: |
          dotnet build src/devops/Rowles.LeanLucene.Tests.Unit/Rowles.LeanLucene.Tests.Unit.csproj -c Release --no-restore
          dotnet build src/devops/Rowles.LeanLucene.Tests.Integration/Rowles.LeanLucene.Tests.Integration.csproj -c Release --no-restore
          dotnet build src/devops/Rowles.LeanLucene.Tests.Chaos/Rowles.LeanLucene.Tests.Chaos.csproj -c Release --no-restore

      - name: Test
        run: |
          dotnet test src/devops/Rowles.LeanLucene.Tests.Unit/Rowles.LeanLucene.Tests.Unit.csproj -c Release --no-build --logger "trx;LogFileName=unit-test-results.trx"
          dotnet test src/devops/Rowles.LeanLucene.Tests.Integration/Rowles.LeanLucene.Tests.Integration.csproj -c Release --no-build --logger "trx;LogFileName=integration-test-results.trx"
          dotnet test src/devops/Rowles.LeanLucene.Tests.Chaos/Rowles.LeanLucene.Tests.Chaos.csproj -c Release --no-build --logger "trx;LogFileName=chaos-test-results.trx"

      - name: Publish Native AOT smoke
        run: dotnet publish src/examples/Rowles.LeanLucene.Example.NativeAot/Rowles.LeanLucene.Example.NativeAot.csproj -c Release -r linux-x64 --self-contained true -p:PublishAot=true -p:WarningsAsErrors=IL2026%3BIL3050%3BIL2070%3BIL2072%3BIL2075%3BIL2090

      - name: Run Native AOT smoke
        run: src/examples/Rowles.LeanLucene.Example.NativeAot/bin/Release/net10.0/linux-x64/publish/Rowles.LeanLucene.Example.NativeAot

      - name: Build docs
        shell: pwsh
        run: ./scripts/docs.ps1 -SkipBenchmarks

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            src/devops/Rowles.LeanLucene.Tests.Unit/TestResults/*.trx
            src/devops/Rowles.LeanLucene.Tests.Integration/TestResults/*.trx
            src/devops/Rowles.LeanLucene.Tests.Chaos/TestResults/*.trx
          if-no-files-found: ignore

      - name: Upload docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: leanlucene-docs-site
          path: docs/site
